
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنصة الرسمية لخرائط الكتامية والباجور الذكية</title>
    
    <!-- Leaflet CSS لإدارة وعرض الخريطة -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Tailwind CSS للتصميم المتجاوب مع الموبايل -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: calc(100vh - 70px); width: 100%; z-index: 1; }
        .mobile-bottom-sheet { z-index: 1000; transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <!-- 1. شاشة تسجيل الدخول وتأمين الحساب للمطورين -->
    <div id="authContainer" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-4 z-[2000]">
        <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-sm">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-purple-400 mb-1">خرائط الكتامية الرسمية</h2>
                <p class="text-gray-400 text-xs">نظام الـ API المتكامل للمطاعم والشركات (أوبر)</p>
            </div>
            <div class="space-y-3">
                <input type="email" id="authEmail" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white text-sm focus:outline-none focus:border-purple-500" placeholder="البريد الإلكتروني">
                <input type="password" id="authPassword" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white text-sm focus:outline-none focus:border-purple-500" placeholder="كلمة المرور">
                <div class="flex gap-2 pt-2">
                    <button onclick="handleLogin()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold py-3 rounded-xl transition">دخول</button>
                    <button onclick="handleRegister()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-sm font-bold py-3 rounded-xl transition">تسجيل جديد</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. الواجهة الرئيسية للتطبيق والخرائط -->
    <div id="dashboardContainer" class="hidden h-screen flex flex-col">
        
        <!-- هيدر علوي مخصص وسريع الاستجابة على الهاتف -->
        <header class="bg-gray-800 px-4 py-3 shadow-md border-b border-purple-600 flex justify-between items-center h-[70px]">
            <h1 class="text-md font-bold text-purple-400 sm:text-lg">الكتامية والقرى المجاورة 🌍</h1>
            <div class="flex gap-1.5">
                <button onclick="activateGPS()" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-3 py-2 rounded-lg transition">GPS 🎯</button>
                <button onclick="toggleBottomSheet()" class="bg-gray-700 text-xs font-bold px-3 py-2 rounded-lg">الـ API 🔑</button>
                <button onclick="handleLogout()" class="bg-red-600 text-xs font-bold px-2 py-2 rounded-lg">🚪</button>
            </div>
        </header>

        <!-- الخريطة الرسمية الدقيقة الموجهة مباشرة لجوجل ماب داتا -->
        <div id="map"></div>

        <!-- لوحة التحكم السفلية للـ API (Bottom Sheet للموبايل) -->
        <div id="apiBottomSheet" class="mobile-bottom-sheet fixed bottom-0 inset-x-0 bg-gray-800 border-t border-purple-600 rounded-t-3xl p-6 transform translate-y-full shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-4" onclick="toggleBottomSheet()"></div>
            <h3 class="text-lg font-bold text-purple-400 mb-2">لوحة مفاتيح الـ API للمشاريع</h3>
            <p class="text-xs text-gray-400 mb-4">عند ربط هذا الـ API في تطبيق خارجي (مثل أوبر)، تظهر الخريطة فوراً بدون صور ومسرعة بالكامل بالأشكال المخصصة لمنطقة الكتامية والباجور.</p>
            
            <div class="space-y-3">
                <input type="text" id="appName" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-sm" placeholder="اسم التطبيق (مثال: Uber_App)">
                <button onclick="generateSecureAPI()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition">حفظ وتوليد المفتاح بسيرفر Firebase 🔒</button>
                
                <div id="apiKeyContainer" class="hidden p-3 bg-gray-950 rounded-xl border border-green-600 font-mono text-xs text-yellow-400 break-all">
                    <p class="font-bold text-green-400 mb-1">مفتاح الـ API النشط الخاص بمشروعك:</p>
                    <code id="apiKeyValue"></code>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- تضمين Firebase SDKs الرسمية والمؤمنة المتوافقة مع ملف واحد -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات البيئة لـ Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
            authDomain: "al-warsha.firebaseapp.com",
            databaseURL: "https://al-warsha-default-rtdb.firebaseio.com",
            projectId: "al-warsha",
            storageBucket: "al-warsha.firebasestorage.app",
            messagingSenderId: "913946656614",
            appId: "1:913946656614:web:9dad073c3c5664c23a92a7",
            measurementId: "G-MSTN31MDJL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map, userMarker, currentUser = null;
        let isSheetOpen = false;

        // التحقق الآمن من حالة المستخدم
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                setTimeout(() => {
                    initMap();
                    loadUserAPIKey();
                }, 200);
            } else {
                currentUser = null;
                document.getElementById('authContainer').classList.remove('hidden');
                document.getElementById('dashboardContainer').classList.add('hidden');
            }
        });

        function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("برجاء ملء كافة الحقول");
            auth.signInWithEmailAndPassword(email, password).catch(err => alert("خطأ في الحساب: " + err.message));
        }

        function handleRegister() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("برجاء ملء كافة الحقول");
            auth.createUserWithEmailAndPassword(email, password).catch(err => alert("خطأ في التسجيل: " + err.message));
        }

        function handleLogout() { auth.signOut(); }

        // تهيئة الخريطة الرسمية بالاعتماد على داتا جوجل ماب لقرية الكتامية والقرى المجاورة لها بالملي
        function initMap() {
            if (map) return;

            // الإحداثيات الجغرافية الرسمية الصارمة من خادم جوجل ماب للكتامية والقرى المجاورة لها بقطاع الـ 5 كم:
            const elKotameyaReal = [30.419077, 31.144161];  // قلب قرية الكتامية على النيل بالظبط
            const alBagourReal = [30.4324, 31.0336];        // مركز الباجور
            
            // إحداثيات القرى المجاورة للكتامية في نطاق الـ 5 كم المأخوذة من جوجل ماب:
            const tantAlJazeera = [30.4201, 31.1524];       // طنط الجزيرة (البر الثاني شرقا)
            const berShams = [30.4348, 31.1415];            // قرية بير شمس (شمالاً)
            const kafrSobk = [30.4025, 31.1410];            // كفر سبك (جنوباً)
            const sobkAlDahak = [30.3950, 31.1270];         // سبك الضحاك (جنوب غرب)

            // فتح وتثبيت الكاميرا مباشرة بزووم قوي على الكتامية لترى الشوارع والبيوت بدقة
            map = L.map('map').setView(elKotameyaReal, 15);

            // جلب سيرفر جوجل ماب لطبقة الستلايت والهجين الرسمية (أدق داتا للمحلات، البيوت، والتقاطعات)
            L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps Data'
            }).addTo(map);

            // وضع علامات المواقع الرسمية والمطابقة تماماً لجوجل ماب
            L.marker(elKotameyaReal).addTo(map)
                .bindPopup("<b class='text-black text-sm'>📍 قرية الكتامية (المركز الرئيسي)</b><br><span class='text-gray-500 text-xs'>تضم كافة الشوارع، البيوت، ومسجد الكتامية الكبير</span>").openPopup();

            L.marker(alBagourReal).addTo(map)
                .bindPopup("<b class='text-black text-sm'>🏢 مركز الباجور - المنوفية</b>");

            L.marker(tantAlJazeera).addTo(map)
                .bindPopup("<b class='text-black text-xs'>🏘️ طنط الجزيرة (القرية المجاورة شرقاً)</b>");

            L.marker(berShams).addTo(map)
                .bindPopup("<b class='text-black text-xs'>🏘️ قرية بير شمس (القرية المجاورة شمالاً)</b>");

            L.marker(kafrSobk).addTo(map)
                .bindPopup("<b class='text-black text-xs'>🏘️ كفر سبك (القرية المجاورة جنوباً)</b>");

            L.marker(sobkAlDahak).addTo(map)
                .bindPopup("<b class='text-black text-xs'>🏘️ سبك الضحاك</b>");

            // رسم محيط تغطية الـ 5 كم الدائري الشامل لكل هذه القرى بدقة تامة لخدمة مشاريع التوصيل
            L.circle(elKotameyaReal, {
                color: '#8b5cf6',
                fillColor: '#8b5cf6',
                fillOpacity: 0.08,
                radius: 5000 // نصف القطر 5000 متر = 5 كم تغطية دائرية مغلقة
            }).addTo(map);
        }

        // تشغيل نظام تحديد المواقع العالمي GPS الحي للتحرك الفعلي على الطريق
        function activateGPS() {
            if (!navigator.geolocation) return alert("هاتفك لا يدعم نظام الـ GPS الحركي");
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    userMarker = L.marker([lat, lng], {
                        icon: L.icon({
                            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                            iconSize: [34, 34]
                        })
                    }).addTo(map).bindPopup("<b class='text-black'>موقعك الفعلي الحالي على الطريق 🎯</b>").openPopup();
                }
                map.setView([lat, lng], 17);
            }, () => alert("يرجى إعطاء صلاحية الـ GPS للمتصفح لتتبع مسارك الحي."), { enableHighAccuracy: true });
        }

        // توليد وحفظ الـ API Key في Firebase تحت المسار المؤمن الخاص بالمستخدم (يمنع خطأ الأذونات تماماً)
        function generateSecureAPI() {
            const appName = document.getElementById('appName').value;
            if (!appName) return alert("برجاء كتابة اسم المشروع المستفيد أولاً");

            const key = `mm_live_api_${Date.now().toString(36)}_${Math.random().toString(36).substring(2, 10)}`;

            // الكتابة في الفرع المؤمن والمصرح لك بالكتابة فيه لمنع خطأ الـ Permission Denied
            database.ref('users/' + currentUser.uid + '/api_details').set({
                appName: appName,
                apiKey: key,
                generatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => { 
                displayAPIKey(key); 
            }).catch(err => {
                alert("خطأ في Firebase: " + err.message + "\nتأكد من تعديل الـ Rules في لوحة التحكم كما وضحنا سابقاً.");
            });
        }

        function loadUserAPIKey() {
            if (!currentUser) return;
            database.ref('users/' + currentUser.uid + '/api_details').once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data && data.apiKey) displayAPIKey(data.apiKey);
            });
        }

        function displayAPIKey(key) {
            document.getElementById('apiKeyValue').innerText = key;
            document.getElementById('apiKeyContainer').classList.remove('hidden');
        }

        // تحريك الـ Bottom Sheet بسلاسة على شاشات الفون
        function toggleBottomSheet() {
            const sheet = document.getElementById('apiBottomSheet');
            if (isSheetOpen) {
                sheet.style.transform = "translateY(100%)";
            } else {
                sheet.style.transform = "translateY(0)";
            }
            isSheetOpen = !isSheetOpen;
        }
    </script>
</body>
</html>
