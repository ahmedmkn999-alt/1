<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة خرائط الباجور والكتامية الاحترافية</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* الخريطة ملء الشاشة على الموبايل */
        #map { height: calc(100vh - 120px); width: 100%; border-radius: 12px; }
        
        /* تكييف العناصر لشاشات الموبايل */
        @media (max-width: 640px) {
            #authContainer, #dashboardContainer { padding: 1rem; }
            h2 { font-size: 1.5rem; }
            button { width: 100%; margin-bottom: 0.5rem; }
            #apiKeyContainer { word-break: break-all; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-x-hidden">

    <div id="authContainer" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-purple-500 mb-2">خرائط المنوفية</h2>
                <p class="text-gray-400 text-sm">منصة الخرائط الاحترافية (الباجور والكتامية)</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">البريد الإلكتروني</label>
                    <input type="email" id="authEmail" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-purple-500" placeholder="الإيميل">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">كلمة المرور</label>
                    <input type="password" id="authPassword" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-purple-500" placeholder="••••••••">
                </div>
                
                <div class="flex flex-col sm:flex-row gap-4 pt-2">
                    <button onclick="handleLogin()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                        دخول
                    </button>
                    <button onclick="handleRegister()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                        إنشاء حساب
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardContainer" class="hidden min-h-screen flex flex-col">
        <header class="bg-gray-800 p-4 shadow-lg border-b border-purple-600 sticky top-0 z-50">
            <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-bold text-purple-400">Maps Pro المنوفية 🌍</h1>
                    <span id="userBadge" class="hidden sm:inline bg-purple-900 text-purple-300 text-xs px-3 py-1 rounded-full font-mono"></span>
                </div>
                <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                    <button onclick="activateGPS()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2 rounded-lg transition">
                        تتبع الـ GPS 🎯
                    </button>
                    <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-4 py-2 rounded-lg transition">
                        خروج 🚪
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 md:p-8 flex-1 space-y-6">
            
            <section class="bg-gray-800 p-4 rounded-2xl shadow-md border border-gray-700">
                <div id="map"></div>
            </section>

            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 space-y-4">
                <h3 class="text-lg font-bold text-purple-400">توليد مفتاح API للمشاريع الأخرى</h3>
                <input type="text" id="appName" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-purple-500" placeholder="اسم مشروعك (مثال: Uber)">
                <button onclick="generateSecureAPI()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition">
                    إنشاء وتخزين مفتاح الـ API 🔒
                </button>
                
                <div id="apiKeyContainer" class="hidden p-4 bg-gray-950 rounded-xl border border-green-600 text-green-400 font-mono text-sm">
                    <p class="font-bold">مفتاح الـ API النشط الخاص بك:</p>
                    <code id="apiKeyValue"></code>
                </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات الـ Firebase الخاصة بك (لا تقم بتغييرها)
        const firebaseConfig = {
            apiKey: "AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
            authDomain: "al-warsha.firebaseapp.com",
            databaseURL: "https://al-warsha-default-rtdb.firebaseio.com",
            projectId: "al-warsha",
            storageBucket: "al-warsha.firebasestorage.app",
            messagingSenderId: "913946656614",
            appId: "1:913946656614:web:9dad073c3c5664c23a92a7",
            measurementId: "G-MSTN31MDJL"
        };

        // تهيئة الـ Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map, userMarker, currentUser = null;

        // إدارة حالة تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                document.getElementById('userBadge').innerText = user.email;
                
                setTimeout(() => {
                    initMap();
                    loadUserAPIKey(); // جلب مفتاح الـ API إذا كان موجوداً
                }, 200);
            } else {
                currentUser = null;
                document.getElementById('authContainer').classList.remove('hidden');
                document.getElementById('dashboardContainer').classList.add('hidden');
            }
        });

        function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("يرجى ملء الحقول");
            auth.signInWithEmailAndPassword(email, password).catch(err => alert("خطأ: " + err.message));
        }

        function handleRegister() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("يرجى ملء الحقول");
            auth.createUserWithEmailAndPassword(email, password).catch(err => alert("خطأ: " + err.message));
        }

        function handleLogout() { auth.signOut(); }

        // تهيئة الخريطة ببيانات جوجل ماب (الأكثر دقة)
        function initMap() {
            if (map) return;
            // التركيز على الكتامية (30.4350, 31.0350)
            map = L.map('map').setView([30.4350, 31.0350], 15);

            // استخدام بيانات جوجل ماب الهجينة (تظهر البيوت والشوارع)
            // هام: الرابط أدناه هو رابط جوجل ماب الرسمي للخرائط، وهو أدق شيء متاح.
            L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);

            // إضافة علامة لقرية الكتامية
            L.marker([30.4350, 31.0350]).addTo(map).bindPopup("قرية الكتامية").openPopup();
            // إضافة علامة لمدينة الباجور
            L.marker([30.4300, 31.0300]).addTo(map).bindPopup("مدينة الباجور");
        }

        // تتبع الـ GPS الفعلي
        function activateGPS() {
            if (!navigator.geolocation) return alert("الـ GPS غير مدعوم على جهازك");
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (userMarker) userMarker.setLatLng([lat, lng]);
                else userMarker = L.marker([lat, lng]).addTo(map).bindPopup("أنت هنا 🎯").openPopup();
                map.setView([lat, lng], 17);
            }, () => alert("يرجى تفعيل الـ GPS."), { enableHighAccuracy: true });
        }

        // توليد وحفظ الـ API في Firebase (تم إصلاح خطأ الـ Permission Denied)
        function generateSecureAPI() {
            const appName = document.getElementById('appName').value;
            if (!appName) return alert("أدخل اسم التطبيق.");
            const key = `mm_live_${Date.now().toString(36)}_${Math.random().toString(36).substring(2, 12)}`;

            // حفظ البيانات في قاعدة البيانات تحت مسار معرف المستخدم (uid) لتجاوز خطأ الأذونات
            database.ref('users/' + currentUser.uid + '/api_details').set({
                appName: appName,
                apiKey: key,
                generatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => { displayAPIKey(key); })
              .catch(err => alert("خطأ في Firebase (تحقق من إعدادات قاعدة البيانات): " + err.message));
        }

        // تحميل مفتاح الـ API إذا كان موجوداً
        function loadUserAPIKey() {
            if (!currentUser) return;
            database.ref('users/' + currentUser.uid + '/api_details').once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data && data.apiKey) displayAPIKey(data.apiKey);
            });
        }

        function displayAPIKey(key) {
            document.getElementById('apiKeyValue').innerText = key;
            document.getElementById('apiKeyContainer').classList.remove('hidden');
        }
    </script>
</body>
</html>
