<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة خرائط الكتامية والباجور الاحترافية</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* تصميم مخصص للموبايل ليصبح مثل التطبيق تماماً */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: calc(100vh - 70px); width: 100%; z-index: 1; }
        .mobile-bottom-sheet { z-index: 1000; transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <!-- 1. شاشة Auth (تسجيل الدخول) - متوافقة تماماً مع شاشات الفون -->
    <div id="authContainer" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-4 z-[2000]">
        <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-sm">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-purple-400 mb-1">خرائط الكتامية الذكية</h2>
                <p class="text-gray-400 text-xs">مركز الباجور - المنوفية</p>
            </div>
            <div class="space-y-3">
                <input type="email" id="authEmail" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white text-sm focus:outline-none focus:border-purple-500" placeholder="البريد الإلكتروني">
                <input type="password" id="authPassword" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-white text-sm focus:outline-none focus:border-purple-500" placeholder="كلمة المرور">
                <div class="flex gap-2 pt-2">
                    <button onclick="handleLogin()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold py-3 rounded-xl transition">دخول</button>
                    <button onclick="handleRegister()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-sm font-bold py-3 rounded-xl transition">تسجيل</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. واجهة التطبيق الرئيسية بعد الدخول -->
    <div id="dashboardContainer" class="hidden h-screen flex flex-col">
        
        <!-- هيدر علوي خفيف للموبايل -->
        <header class="bg-gray-800 px-4 py-3 shadow-md border-b border-purple-600 flex justify-between items-center h-[70px]">
            <h1 class="text-lg font-bold text-purple-400">الكتامية & الباجور Pro 🌍</h1>
            <div class="flex gap-2">
                <button onclick="activateGPS()" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-3 py-2 rounded-lg transition">GPS 🎯</button>
                <button onclick="toggleBottomSheet()" class="bg-gray-700 text-xs font-bold px-3 py-2 rounded-lg">الـ API 🔑</button>
                <button onclick="handleLogout()" class="bg-red-600 text-xs font-bold px-2 py-2 rounded-lg">🚪</button>
            </div>
        </header>

        <!-- الخريطة الفوق دقيقة الموجهة للنيل والكتامية -->
        <div id="map"></div>

        <!-- لوحة الـ API التنازلية (تفتح كـ Bottom Sheet في الموبايل عند الضغط) -->
        <div id="apiBottomSheet" class="mobile-bottom-sheet fixed bottom-0 inset-x-0 bg-gray-800 border-t border-purple-600 rounded-t-3xl p-6 transform translate-y-full shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-4" onclick="toggleBottomSheet()"></div>
            <h3 class="text-lg font-bold text-purple-400 mb-2">توليد الـ API للمشاريع التابعة (أوبر وغيره)</h3>
            <p class="text-xs text-gray-400 mb-4">الخريطة تعرض داتا جوجل للشوارع والبيوت والحدود الإدارية للكتامية بدون لوجو جوجل للشركات المستفيدة.</p>
            
            <div class="space-y-3">
                <input type="text" id="appName" class="w-full p-3 rounded-xl bg-gray-700 border border-gray-600 text-sm" placeholder="اسم الشركة المستفيدة">
                <button onclick="generateSecureAPI()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition">توليد وتخزين المفتاح 🔒</button>
                
                <div id="apiKeyContainer" class="hidden p-3 bg-gray-950 rounded-xl border border-green-600 font-mono text-xs text-yellow-400 break-all">
                    <p class="font-bold text-green-400 mb-1">مفتاح الـ API النشط ومسجل بالسيرفر:</p>
                    <code id="apiKeyValue"></code>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
            authDomain: "al-warsha.firebaseapp.com",
            databaseURL: "https://al-warsha-default-rtdb.firebaseio.com",
            projectId: "al-warsha",
            storageBucket: "al-warsha.firebasestorage.app",
            messagingSenderId: "913946656614",
            appId: "1:913946656614:web:9dad073c3c5664c23a92a7",
            measurementId: "G-MSTN31MDJL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map, userMarker, currentUser = null;
        let isSheetOpen = false;

        // التحقق من الحساب والأمان
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                setTimeout(() => {
                    initMap();
                    loadUserAPIKey();
                }, 200);
            } else {
                currentUser = null;
                document.getElementById('authContainer').classList.remove('hidden');
                document.getElementById('dashboardContainer').classList.add('hidden');
            }
        });

        function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("يرجى ملء كافة الحقول");
            auth.signInWithEmailAndPassword(email, password).catch(err => alert("خطأ: " + err.message));
        }

        function handleRegister() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("يرجى ملء كافة الحقول");
            auth.createUserWithEmailAndPassword(email, password).catch(err => alert("خطأ: " + err.message));
        }

        function handleLogout() { auth.signOut(); }

        // تهيئة الخريطة بالظبط بالظبط على إحداثيات الصورة
        function initMap() {
            if (map) return;

            // الإحداثي الفعلي والمطابق لصورة جوجل ماب المرفقة (القطاع الممتد بين النيل والباجور)
            const elKotameyaReal = [30.4191, 31.1441]; // قلب قرية الكتامية على النيل بالظبط بالظبط
            const alBagourReal = [30.4324, 31.0336];    // مركز الباجور

            // فتح الخريطة بزوم قوي (16) يظهر البيوت والتقسيم الإداري والشوارع المحيطة بالكتامية في نطاق 5 كم
            map = L.map('map').setView(elKotameyaReal, 16);

            // استخدام داتا سيرفر جوجل ماب لطبقة التضاريس والبيوت والشوارع (الخريطة الهجينة الأقوى)
            L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps Data Powered'
            }).addTo(map);

            // تثبيت العلامات الرسمية للأماكن
            L.marker(elKotameyaReal).addTo(map)
                .bindPopup("<b class='text-black text-sm'>📍 قرية الكتامية بالباجور (الموقع الفعلي الصحيح للبيوت والشوارع)</b>").openPopup();

            L.marker(alBagourReal).addTo(map)
                .bindPopup("<b class='text-black text-sm'>🏢 مركز الباجور - المنوفية</b>");

            // رسم دائرة بنطاق 5 كم حول الكتامية لتغطية كل القرى المجاورة (مثل بير شمس، عزبة الحوفي، عزبة سالم بازي وطنط الجزيرة) كما طلبت
            L.circle(elKotameyaReal, {
                color: '#a855f7',
                fillColor: '#a855f7',
                fillOpacity: 0.1,
                radius: 5000 // 5 آلاف متر = 5 كم محيط التغطية الشاملة
            }).addTo(map);
        }

        // تفعيل تتبع الـ GPS الحي على الهاتف والتحرك مع الطريق
        function activateGPS() {
            if (!navigator.geolocation) return alert("هاتفك لا يدعم تتبع الـ GPS");
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    userMarker = L.marker([lat, lng], {
                        icon: L.icon({
                            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                            iconSize: [34, 34]
                        })
                    }).addTo(map).bindPopup("<b class='text-black'>موقعك الحي على الطريق 🎯</b>").openPopup();
                }
                map.setView([lat, lng], 17);
            }, () => alert("يرجى تفعيل صلاحية الـ GPS على هاتفك."), { enableHighAccuracy: true });
        }

        // توليد وحفظ الـ API Key في حسابك بـ Firebase بأمان كامل وبدون أخطاء أذونات
        function generateSecureAPI() {
            const appName = document.getElementById('appName').value;
            if (!appName) return alert("يرجى كتابة اسم الشركة المستفيدة أولاً");

            const key = `mm_live_secure_${Date.now().toString(36)}_${Math.random().toString(36).substring(2, 10)}`;

            // الكتابة في الفرع المخصص لحسابك لتجنب الـ PERMISSION_DENIED
            database.ref('users/' + currentUser.uid + '/api_details').set({
                appName: appName,
                apiKey: key,
                generatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => { 
                displayAPIKey(key); 
            }).catch(err => {
                alert("خطأ في حفظ الـ API بسيرفر Firebase: " + err.message);
            });
        }

        function loadUserAPIKey() {
            if (!currentUser) return;
            database.ref('users/' + currentUser.uid + '/api_details').once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data && data.apiKey) displayAPIKey(data.apiKey);
            });
        }

        function displayAPIKey(key) {
            document.getElementById('apiKeyValue').innerText = key;
            document.getElementById('apiKeyContainer').classList.remove('hidden');
        }

        // فتح وإغلاق قائمة الـ API من أسفل الشاشة في الموبايل
        function toggleBottomSheet() {
            const sheet = document.getElementById('apiBottomSheet');
            if (isSheetOpen) {
                sheet.style.transform = "translateY(100%)";
            } else {
                sheet.style.transform = "translateY(0)";
            }
            isSheetOpen = !isSheetOpen;
        }
    </script>
</body>
</html>
